<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Réinitialisation locale</title>
</head>
<body>
  <script>
    (async () => {
      try {
        localStorage.removeItem('ghazali_ob_screen');
        localStorage.removeItem('ghazali_name_meanings');
        localStorage.removeItem('ghazali_name_meanings_v2');
        localStorage.removeItem('ghazali_name_meanings_v3');

        if ('caches' in window) {
          const keys = await caches.keys();
          await Promise.all(keys.filter((key) => key.startsWith('ghazali-')).map((key) => caches.delete(key)));
        }

        if ('serviceWorker' in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map((registration) => registration.unregister()));
        }
      } catch (e) {
        console.error('Local reset failed:', e);
      } finally {
        window.location.replace('/onboarding?fresh=1');
      }
    })();
  </script>
</body>
</html>
