<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ahlam — Interprétation de votre rêve | Al Manami</title>
<meta name="description" content="Confiez votre rêve à Ahlam pour une interprétation personnalisée selon la tradition islamique d'Ibn Sirin et Al-Nabulsi.">
<meta name="robots" content="noindex, nofollow">
<link rel="canonical" href="https://almanami.com/chat">

<!-- Open Graph -->
<meta property="og:type" content="website">
<meta property="og:url" content="https://almanami.com/chat">
<meta property="og:title" content="Ahlam — Interprétation de votre rêve">
<meta property="og:description" content="Interprétation personnalisée de vos rêves selon Ibn Sirin, Al-Nabulsi et Ibn Shahin.">
<meta property="og:image" content="https://almanami.com/og-image.jpg">

<!-- Hreflang -->
<link rel="alternate" hreflang="fr" href="https://almanami.com/chat">
<link rel="alternate" hreflang="ar" href="https://almanami.com/chat">
<link rel="alternate" hreflang="x-default" href="https://almanami.com/chat">

<!-- Favicon & PWA -->
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" href="/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="manifest" href="/manifest.json">

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Aref+Ruqaa:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    font-family: 'Cormorant Garamond', serif;
    background: #000;
    color: #fff;
    overflow: hidden;
  }

  /* ── background video ── */
  .bg-video-wrap {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
  }
  .bg-video {
    position: absolute;
    top: 50%;
    left: 50%;
    min-width: 100%;
    min-height: 100%;
    width: auto;
    height: auto;
    transform: translate(-50%, -50%) translateZ(0);
    -webkit-transform: translate(-50%, -50%) translateZ(0);
    object-fit: cover;
    filter: brightness(0.87);
  }

  /* ── dark overlay ── */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(18, 14, 12, 0.45);
    z-index: 1;
  }

  /* ── film grain overlay ── */
  .grain {
    position: fixed;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    opacity: 0.04;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-repeat: repeat;
    background-size: 200px 200px;
  }

  /* ── page layout ── */
  .page {
    position: relative;
    z-index: 5;
    display: flex;
    flex-direction: column;
    height: 100%;
    height: 100dvh;
  }

  /* ── header ── */
  .chat-header {
    flex-shrink: 0;
    text-align: center;
    padding: 16px 20px 12px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
  }

  .chat-header .title-main {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 400;
    color: rgba(255, 252, 248, 0.80);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    text-shadow: 0 2px 10px rgba(0,0,0,0.5);
  }

  .chat-header .title-arabic {
    font-family: 'Aref Ruqaa', serif;
    font-size: 14px;
    font-weight: 700;
    color: rgba(255, 252, 248, 0.60);
    direction: rtl;
    margin-top: 1px;
    text-shadow: 0 1px 8px rgba(0,0,0,0.4);
  }

  /* ── messages area ── */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 24px;
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
  }

  .messages::-webkit-scrollbar { width: 3px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 3px; }

  /* ── message bubbles ── */
  .message {
    max-width: 85%;
    line-height: 1.65;
    animation: msgFadeIn 0.5s ease both;
  }

  @keyframes msgFadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user {
    align-self: flex-end;
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 400;
    color: rgba(255, 252, 248, 0.88);
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 3px;
    padding: 14px 20px;
  }

  .message.ahlam {
    align-self: flex-start;
    font-family: 'Cormorant Garamond', serif;
    font-size: 19px;
    font-weight: 300;
    color: rgba(255, 252, 248, 0.88);
    padding: 4px 4px;
    letter-spacing: 0.005em;
    text-shadow: 0 1px 6px rgba(0,0,0,0.4);
  }

  .message.ahlam p {
    margin-bottom: 14px;
  }

  .message.ahlam p:last-child {
    margin-bottom: 0;
  }

  /* ── RTL support ── */
  .rtl .messages { direction: rtl; }
  .rtl .message.user { text-align: right; direction: rtl; }
  .rtl .message.ahlam { text-align: right; direction: rtl; }
  .rtl .chat-input-area { direction: rtl; }
  .rtl .chat-input { text-align: right; direction: rtl; }

  /* ── loading animation ── */
  .loading-container {
    align-self: flex-start;
    padding: 4px 4px;
    animation: msgFadeIn 0.5s ease both;
  }

  .loading-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    font-weight: 300;
    font-style: italic;
    color: rgba(230, 220, 240, 0.78);
    letter-spacing: 0.02em;
    transition: opacity 0.8s ease;
    text-shadow: 0 1px 8px rgba(0,0,0,0.5);
  }

  .loading-text.hidden {
    opacity: 0;
  }

  /* ── subtle dot pulse next to loading text ── */
  .loading-dot {
    display: inline-block;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: rgba(230, 220, 240, 0.45);
    margin-left: 8px;
    vertical-align: middle;
    animation: dotPulse 1.6s ease-in-out infinite;
  }

  .rtl .loading-dot {
    margin-left: 0;
    margin-right: 8px;
  }

  @keyframes dotPulse {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
  }

  /* ── input area ── */
  .chat-input-area {
    flex-shrink: 0;
    padding: 12px 16px;
    padding-bottom: max(12px, env(safe-area-inset-bottom));
    border-top: 1px solid rgba(255, 255, 255, 0.08);
    display: flex;
    align-items: flex-end;
    gap: 0;
    background: rgba(0, 0, 0, 0.3);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }

  .input-bar {
    flex: 1;
    display: flex;
    align-items: flex-end;
    background: rgba(0, 0, 0, 0.15);
    border: 1px solid rgba(255, 255, 255, 0.35);
    border-radius: 3px;
    transition: border-color 0.4s ease, background 0.4s ease;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }

  .input-bar:focus-within {
    border-color: rgba(255, 255, 255, 0.40);
    background: rgba(0, 0, 0, 0.18);
  }

  .chat-input {
    flex: 1;
    min-width: 0;
    border: none;
    outline: none;
    background: transparent;
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 300;
    color: #fff;
    padding: 14px 18px;
    caret-color: rgba(255, 255, 255, 0.85);
    resize: none;
    overflow: hidden;
    line-height: 1.5;
    height: 50px;
    min-height: 50px;
    max-height: 160px;
    transition: height 0.2s ease;
    -webkit-appearance: none;
    appearance: none;
    display: block;
  }

  .chat-input::placeholder {
    color: rgba(255, 255, 255, 0.60);
    font-style: italic;
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 300;
    line-height: 1.5;
    opacity: 1;
  }

  .send-btn {
    flex-shrink: 0;
    border: none;
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 14px 14px;
    opacity: 0.65;
    transition: opacity 0.3s ease;
  }

  .send-btn:hover { opacity: 0.85; }
  .input-bar:focus-within .send-btn { opacity: 0.7; }
  .input-bar:focus-within .send-btn:hover { opacity: 0.9; }

  .send-btn svg {
    width: 16px;
    height: 16px;
  }

  .send-btn:disabled {
    opacity: 0.2;
    cursor: default;
  }

  /* ── mobile ── */
  @media (max-width: 480px) {
    .chat-header { padding: 12px 16px 10px; }
    .chat-header .title-main { font-size: 15px; }
    .chat-header .title-arabic { font-size: 12px; }
    .messages { padding: 18px 14px 12px; gap: 20px; }
    .message { max-width: 90%; }
    .message.user { font-size: 16px; padding: 12px 16px; }
    .message.ahlam { font-size: 17px; }
    .chat-input { font-size: 16px; padding: 12px 14px; height: 46px; min-height: 46px; }
    .chat-input::placeholder { font-size: 16px; }
    .send-btn { padding: 12px 12px; }
    .loading-text { font-size: 14px; }
  }
</style>
</head>
<body>

<div class="bg-video-wrap">
  <video class="bg-video" autoplay muted loop playsinline webkit-playsinline poster="poster.jpg">
    <source src="background.mp4" type="video/mp4">
  </video>
</div>

<div class="overlay"></div>
<div class="grain"></div>

<main class="page" id="page">

  <!-- header -->
  <header class="chat-header">
    <h1 class="title-main">AL MANAMI</h1>
    <p class="title-arabic" lang="ar">المنامي</p>
  </header>

  <!-- messages -->
  <div class="messages" id="messages" role="log" aria-live="polite" aria-label="Messages"></div>

  <!-- input -->
  <div class="chat-input-area">
    <div class="input-bar">
      <textarea
        class="chat-input"
        id="chatInput"
        placeholder="Raconte-moi la suite..."
        autocomplete="off"
        spellcheck="false"
        rows="1"
      ></textarea>
      <button class="send-btn" id="sendBtn" title="Envoyer" aria-label="Envoyer">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M5 12h14M13 6l6 6-6 6" stroke="rgba(255,255,255,0.8)" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>

</main>

<script>
(function () {

  // ── Config ──
  const API_URL = '/api/chat';
  const MIN_LOADING_MS = 9000;

  // System prompt is now server-side only (api/_system-prompt.js)


  // ── Loading step texts by language ──
  const LOADING_STEPS = {
    ar: [
      'أحلام تراجع تفسيرات ابن سيرين...',
      'البحث في مؤلفات النابلسي...',
      'تحليل سياق رؤيتك...'
    ],
    fr: [
      'Ahlam consulte les écrits d\'Ibn Sirin...',
      'Vérification dans l\'ouvrage d\'Al-Nabulsi...',
      'Analyse du contexte de ton rêve...'
    ],
    tr: [
      'Ahlam, İbn Sirin\'in yazılarına bakıyor...',
      'Al-Nabulsi\'nin eserlerinde doğrulama...',
      'Rüyanın bağlamı analiz ediliyor...'
    ],
    de: [
      'Ahlam konsultiert die Schriften von Ibn Sirin...',
      'Überprüfung im Werk von Al-Nabulsi...',
      'Analyse des Kontexts deines Traumes...'
    ]
  };

  // ── State ──
  const messagesEl = document.getElementById('messages');
  const chatInput = document.getElementById('chatInput');
  const sendBtn = document.getElementById('sendBtn');
  const page = document.getElementById('page');
  let conversationHistory = [];
  let isStreaming = false;
  let detectedLang = 'fr';

  // ── Language detection ──
  function detectLanguage(text) {
    const arabicRe = /[\u0600-\u06FF\u0750-\u077F\u08A0-\u08FF]/;
    const turkishRe = /[ğüşöçıİĞÜŞÖÇ]/i;
    const germanRe = /\b(ich|und|der|die|das|ein|eine|ist|habe|hatte|traum|geträumt)\b/i;
    if (arabicRe.test(text)) return 'ar';
    if (turkishRe.test(text)) return 'tr';
    if (germanRe.test(text)) return 'de';
    return 'fr';
  }

  // ── RTL handling ──
  function applyRTL(lang) {
    if (lang === 'ar') {
      page.classList.add('rtl');
      chatInput.setAttribute('dir', 'rtl');
      chatInput.style.textAlign = 'right';
    }
  }

  // ── Add message to chat ──
  function addMessage(text, role) {
    const div = document.createElement('div');
    div.className = 'message ' + role;
    if (role === 'ahlam') {
      div.innerHTML = textToParagraphs(text);
    } else {
      div.textContent = text;
    }
    if (detectedLang === 'ar') {
      div.setAttribute('dir', 'rtl');
    }
    messagesEl.appendChild(div);
    scrollToBottom();
    return div;
  }

  // ── Convert plain text to <p> tags ──
  function textToParagraphs(text) {
    return text.split(/\n{2,}/).filter(Boolean).map(function(p) {
      return '<p>' + escapeHtml(p.trim()) + '</p>';
    }).join('');
  }

  function escapeHtml(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  function scrollToBottom() {
    requestAnimationFrame(function() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    });
  }

  // ── Loading animation ──
  function showLoading() {
    const steps = LOADING_STEPS[detectedLang] || LOADING_STEPS.fr;
    const container = document.createElement('div');
    container.className = 'loading-container';
    if (detectedLang === 'ar') container.setAttribute('dir', 'rtl');

    const textEl = document.createElement('span');
    textEl.className = 'loading-text';
    textEl.textContent = steps[0];

    const dot = document.createElement('span');
    dot.className = 'loading-dot';

    container.appendChild(textEl);
    container.appendChild(dot);
    messagesEl.appendChild(container);
    scrollToBottom();

    let step = 0;
    const interval = setInterval(function() {
      step++;
      if (step >= steps.length) {
        clearInterval(interval);
        return;
      }
      textEl.classList.add('hidden');
      setTimeout(function() {
        textEl.textContent = steps[step];
        textEl.classList.remove('hidden');
      }, 400);
    }, 3000);

    return { container: container, cleanup: function() { clearInterval(interval); } };
  }

  // ── Gemini API call with streaming ──
  // ── Anthropic API call with streaming ──
  async function callAnthropic(userText) {
    conversationHistory.push({ role: 'user', content: userText });

    const response = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: conversationHistory
      })
    });

    if (!response.ok) {
      const errBody = await response.text();
      throw new Error('API error ' + response.status + ': ' + errBody);
    }

    return response;
  }

  // ── Stream response and collect text ──
  async function readStream(response) {
    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let fullText = '';
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (line.startsWith('data: ')) {
          const jsonStr = line.slice(6).trim();
          if (!jsonStr || jsonStr === '[DONE]') continue;
          try {
            const data = JSON.parse(jsonStr);
            if (data.type === 'content_block_delta' && data.delta && data.delta.type === 'text_delta') {
              fullText += data.delta.text;
            }
          } catch (e) {
            // skip malformed chunks
          }
        }
      }
    }

    return fullText;
  }

  // ── Stream text into a message element word by word ──
  function streamTextInto(el, text, onDone) {
    const words = text.split(/\b/); // split on word boundaries
    let shown = '';
    let wi = 0;
    const speed = 14; // ms per token
    const batch = 3; // tokens per tick
    function tick() {
      if (wi < words.length) {
        const end = Math.min(wi + batch, words.length);
        for (let j = wi; j < end; j++) shown += words[j];
        wi = end;
        el.innerHTML = textToParagraphs(shown);
        scrollToBottom();
        setTimeout(tick, speed);
      } else {
        if (onDone) onDone();
      }
    }
    tick();
  }

  // ── Main send logic ──
  async function sendMessage(text) {
    if (!text.trim() || isStreaming) return;
    isStreaming = true;
    sendBtn.disabled = true;

    // Detect language on first message
    if (conversationHistory.length === 0) {
      detectedLang = detectLanguage(text);
      applyRTL(detectedLang);
    }

    // Show user message
    addMessage(text, 'user');

    // Start loading animation and API call in parallel
    const loading = showLoading();
    const loadingStart = Date.now();

    let fullText = '';
    let apiError = false;

    try {
      const response = await callAnthropic(text);
      fullText = await readStream(response);
    } catch (err) {
      console.error('Anthropic API error:', err);
      apiError = true;
      fullText = detectedLang === 'ar'
        ? 'عذراً، حدث خطأ. يرجى المحاولة مرة أخرى.'
        : 'Pardonne-moi, une erreur est survenue. Essaie à nouveau.';
    }

    // Wait for minimum loading time
    const elapsed = Date.now() - loadingStart;
    const remaining = MIN_LOADING_MS - elapsed;
    if (remaining > 0) {
      await new Promise(function(r) { setTimeout(r, remaining); });
    }

    // Remove loading animation
    loading.cleanup();
    loading.container.remove();

    // Add Ahlam's response with streaming effect
    const msgEl = document.createElement('div');
    msgEl.className = 'message ahlam';
    if (detectedLang === 'ar') msgEl.setAttribute('dir', 'rtl');
    messagesEl.appendChild(msgEl);

    // Store in history
    if (!apiError) {
      conversationHistory.push({ role: 'assistant', content: fullText });
    }

    // Stream the text in
    streamTextInto(msgEl, fullText, function() {
      isStreaming = false;
      sendBtn.disabled = false;
      chatInput.focus();
    });
  }

  // ── Input auto-resize ──
  chatInput.addEventListener('input', function() {
    this.style.height = 'auto';
    const target = Math.max(50, Math.min(this.scrollHeight, 160));
    this.style.height = target + 'px';
    this.style.overflow = this.scrollHeight > 160 ? 'auto' : 'hidden';
  });

  // ── Submit handlers ──
  chatInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      const text = this.value.trim();
      if (text && !isStreaming) {
        this.value = '';
        this.style.height = '50px';
        this.style.overflow = 'hidden';
        sendMessage(text);
      }
    }
  });

  sendBtn.addEventListener('click', function() {
    const text = chatInput.value.trim();
    if (text && !isStreaming) {
      chatInput.value = '';
      chatInput.style.height = '50px';
      chatInput.style.overflow = 'hidden';
      sendMessage(text);
    }
  });

  // ── Init: grab dream from localStorage and auto-send ──
  const dream = localStorage.getItem('almanami_dream');
  if (dream) {
    localStorage.removeItem('almanami_dream');
    setTimeout(function() { sendMessage(dream); }, 300);
  } else {
    chatInput.focus();
  }

})();
</script>

</body>
</html>
